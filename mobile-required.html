<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Device Required – WatchPaid</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column}
  .navbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:0 2rem;display:flex;align-items:center;height:60px}
  .logo{font-size:18px;font-weight:600;color:#1a1a1a;text-decoration:none}.logo span{color:#2563eb}
  .main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
  .card{background:#fff;border-radius:16px;border:1px solid #e5e5e5;padding:2.5rem 2rem;max-width:440px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
  .phone-icon{margin-bottom:1.25rem}
  .phone-icon svg{width:56px;height:56px;stroke:#2563eb;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .card h1{font-size:22px;font-weight:700;color:#111;margin-bottom:10px}
  .card p{font-size:15px;color:#666;line-height:1.65;margin-bottom:1.75rem;max-width:320px;margin-left:auto;margin-right:auto}
  .qr-wrapper{background:#f9fafb;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem;display:inline-block;margin-bottom:1.25rem}
  .qr-wrapper canvas{display:block}
  .scan-note{font-size:13px;color:#999;margin-top:0}
  .back-link{display:inline-block;margin-top:1.5rem;font-size:13px;color:#2563eb;text-decoration:none}
  .back-link:hover{text-decoration:underline}
  .footer{background:#111;color:#666;padding:1.25rem 2rem;text-align:center;font-size:12px}
  a.btn-apply,a.btn-save,a.btn-blue,a.btn-outline,a.sidebar-apply-btn,a.view-profile,a.share-btn,a.cat-card,a.job-card,a.blog-card,a.cta-box a{text-decoration:none}
  /* Hamburger - mobile only */
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none}
  .hamburger span{display:block;width:22px;height:2px;background:#1a1a1a;border-radius:2px;transition:all 0.25s}
  .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
  .hamburger.open span:nth-child(2){opacity:0}
  .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
  .mobile-menu{display:none;position:fixed;top:60px;left:0;right:0;background:#fff;border-bottom:1px solid #e5e5e5;z-index:99;padding:1rem 1.5rem;flex-direction:column;gap:0}
  .mobile-menu a{font-size:15px;color:#333;text-decoration:none;padding:12px 0;border-bottom:1px solid #f5f5f5;display:block}
  .mobile-menu a:last-child{border-bottom:none}
  .mobile-menu a.active{color:#2563eb}
  .mobile-menu a.featured-tab{color:#1e3a5f;font-weight:600}
</style>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💼</text></svg>">
</head>
<body>

<nav class="navbar">
  <a class="logo" href="movie-reviewer-job.html">Watch<span>Paid</span></a>
</nav>

<div class="main">
  <div class="card">
    <div class="phone-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
        <line x1="12" y1="18" x2="12.01" y2="18"/>
      </svg>
    </div>
    <h1>Mobile Device Required</h1>
    <p>Please scan the QR code below with your phone to apply for the Remote Movie Reviewer position.</p>
    <div class="qr-wrapper">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://watchpaid.com/movie-reviewer-job.html&format=png&margin=10" width="200" height="200" alt="QR Code" style="display:block;border-radius:4px">
    </div>
    <p class="scan-note">Open your phone camera and point it at the QR code</p>

  </div>
</div>

<footer class="footer">
  &copy;2026 WatchPaid. All rights reserved.
</footer>



</body>
</html>
